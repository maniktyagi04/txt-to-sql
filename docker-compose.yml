version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: txt-to-sql-api:latest
    container_name: txt-to-sql-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_URL=redis://redis-cache:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      redis-cache:
        condition: service_healthy
    restart: always

  redis-cache:
    image: redis:7.2-alpine
    container_name: txt-to-sql-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  redis_data:
